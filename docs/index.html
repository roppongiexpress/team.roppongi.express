    <script>
      $(function () {
        $(".parallax-block").parallax();
        // フェードイン  アップ
        $(".inview-fadeinup").on("inview", function (event, isInView, visiblePartX, visiblePartY) {
          if (isInView) {
            $(this).stop().addClass("fadeinup");
          } else {
            $(this).stop().removeClass("fadeinup");
          }
        });
      });
      $(function () {
        countDown();
      });
      function countDown() {
        var startDateTime = new Date();
        var endDateTime = new Date("December 25,2016 00:00:00");
        var left = endDateTime - startDateTime;
        var a_day = 24 * 60 * 60 * 1000;
        var d = Math.floor(left / a_day);
        var h = Math.floor((left % a_day) / (60 * 60 * 1000));
        var m = Math.floor((left % a_day) / (60 * 1000)) % 60;
        var s = (Math.floor((left % a_day) / 1000) % 60) % 60;
        if (h < 10) {
          h = "0" + h;
        }
        if (m < 10) {
          m = "0" + m;
        }
        if (s < 10) {
          s = "0" + s;
        }
        $("#time").html('<span class="day">' + d + "</span>" + '<span class="day">' + h + "</span>" + '<span class="day">' + m + "</span>" + '<span class="day">' + s + "</span>");
        setTimeout("countDown()", 1000);
      }
